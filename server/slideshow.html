<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ender&rsquo;s Graduation &mdash; Photo Slideshow</title>
    <style>
        :root {
            --navy: #0d1520;
            --gold:  #c9a227;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--navy); }

        /* star field */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(rgba(201,162,39,0.06) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px, 22px 22px;
            background-position: 0 0, 11px 11px;
            pointer-events: none;
        }

        /* ── stage: two crossfading slides ── */
        .stage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.75s ease-in-out;
            pointer-events: none;
        }
        .slide.active { opacity: 1; }

        /* polaroid images already have white frame baked in server-side */
        .polaroid-img {
            max-height: 82vh;
            max-width: 82vw;
            width: auto;
            height: auto;
            display: block;
            border-radius: 1px;
            box-shadow:
                0 24px 64px rgba(0,0,0,0.75),
                0 6px 20px rgba(0,0,0,0.5);
            will-change: transform;
            /* per-photo rotation applied inline */
        }

        /* ── empty state ── */
        .empty {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Georgia, serif;
            font-style: italic;
            color: rgba(255,255,255,0.18);
            font-size: clamp(1rem, 3vw, 1.4rem);
            letter-spacing: 0.05em;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .empty.hidden { opacity: 0; }

        /* ── HUD: counter + fullscreen ── */
        .hud {
            position: fixed;
            bottom: 20px;
            left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
            pointer-events: none;
        }

        .counter {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
        }

        .fs-btn {
            pointer-events: all;
            background: none;
            border: 1px solid rgba(201,162,39,0.25);
            border-radius: 6px;
            padding: 7px 9px;
            cursor: pointer;
            color: rgba(201,162,39,0.5);
            line-height: 0;
            transition: border-color 0.2s, color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .fs-btn:hover, .fs-btn:active {
            border-color: rgba(201,162,39,0.7);
            color: rgba(201,162,39,0.9);
        }

        /* ── progress bar ── */
        .progress {
            position: fixed;
            bottom: 0; left: 0;
            height: 2px;
            background: rgba(201,162,39,0.45);
            width: 0%;
            transition: width linear;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="slide" id="slide-a"></div>
        <div class="slide" id="slide-b"></div>
    </div>

    <div class="empty" id="empty">Waiting for the first photo&hellip;</div>

    <div class="hud">
        <span class="counter" id="counter"></span>
        <button class="fs-btn" id="fs-btn" title="Fullscreen">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.75"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 3 21 3 21 9"/>
                <polyline points="9 21 3 21 3 15"/>
                <line x1="21" y1="3" x2="14" y2="10"/>
                <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
        </button>
    </div>

    <div class="progress" id="progress"></div>

    <script>
        var INTERVAL      = 6000;   // ms per photo
        var POLL_INTERVAL = 15000;  // ms between /api/album polls

        var slides     = [document.getElementById('slide-a'), document.getElementById('slide-b')];
        var emptyEl    = document.getElementById('empty');
        var counterEl  = document.getElementById('counter');
        var progressEl = document.getElementById('progress');
        var fsBtnEl    = document.getElementById('fs-btn');

        // photos: array of {id, url, timestamp} sorted oldest-first
        var photos     = [];
        var currentIdx = -1;
        var active     = 0;
        var pending    = [];    // ids of newly-arrived photos to show next
        var timer      = null;
        var pollTimer  = null;
        var busy       = false;

        // knownIds: set for deduplication across polls
        var knownIds = {};

        var ROTATIONS = [-3.2, 2.1, -1.8, 3.4, -2.6, 1.5, -4.1, 2.8, -1.2, 3.7];
        function rotationFor(idx) {
            return ROTATIONS[idx % ROTATIONS.length];
        }

        function updateCounter() {
            if (photos.length === 0) { counterEl.textContent = ''; return; }
            counterEl.textContent = (currentIdx + 1) + ' / ' + photos.length;
        }

        function startProgress() {
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    progressEl.style.transition = 'width ' + INTERVAL + 'ms linear';
                    progressEl.style.width = '100%';
                });
            });
        }
        function resetProgress() {
            progressEl.style.transition = 'none';
            progressEl.style.width = '0%';
        }

        // Crossfade to a photo object {id, url, timestamp} at index idx
        function crossfadeTo(photoObj, idx) {
            if (busy) return;
            busy = true;

            var next = 1 - active;
            var deg  = rotationFor(idx);

            var img = new Image();
            img.className = 'polaroid-img';
            img.style.transform = 'rotate(' + deg + 'deg)';
            img.alt = 'Party photo';

            img.onload = function() {
                slides[next].innerHTML = '';
                slides[next].appendChild(img);

                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        slides[next].classList.add('active');
                        slides[active].classList.remove('active');
                        active = next;
                        currentIdx = idx;
                        busy = false;

                        emptyEl.classList.add('hidden');
                        updateCounter();
                        scheduleAdvance();
                        startProgress();
                    });
                });
            };

            img.onerror = function() {
                busy = false;
                advance();
            };

            // Cache-bust on each display so AI-style replacements are always picked up
            img.src = photoObj.url + '?t=' + Date.now();
        }

        function advance() {
            clearTimeout(timer);
            resetProgress();
            if (photos.length === 0) return;

            var targetIdx;
            if (pending.length > 0) {
                var id = pending.shift();
                targetIdx = -1;
                for (var i = 0; i < photos.length; i++) {
                    if (photos[i].id === id) { targetIdx = i; break; }
                }
                if (targetIdx < 0) targetIdx = photos.length - 1;
            } else {
                targetIdx = (currentIdx + 1) % photos.length;
            }

            crossfadeTo(photos[targetIdx], targetIdx);
        }

        function scheduleAdvance() {
            clearTimeout(timer);
            timer = setTimeout(advance, INTERVAL);
        }

        // Poll /api/album every POLL_INTERVAL ms
        function fetchAlbum() {
            clearTimeout(pollTimer);

            fetch('/api/album')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    // album_ok: false means Immich is unreachable — keep showing cached list
                    if (!data.album_ok) {
                        console.warn('[slideshow] Immich unreachable — keeping cached list');
                        schedulePoll();
                        return;
                    }

                    var incoming = data.photos || [];
                    // Sort oldest-first so array indices stay stable across polls
                    incoming.sort(function(a, b) { return a.timestamp - b.timestamp; });

                    var newArrivals = [];
                    incoming.forEach(function(p) {
                        if (!knownIds[p.id]) {
                            knownIds[p.id] = true;
                            photos.push(p);
                            newArrivals.push(p.id);
                        }
                    });

                    // Queue new arrivals to show next (most recent first)
                    for (var i = newArrivals.length - 1; i >= 0; i--) {
                        pending.push(newArrivals[i]);
                    }

                    if (currentIdx === -1 && photos.length > 0) {
                        // First load — start from the most recent photo
                        crossfadeTo(photos[photos.length - 1], photos.length - 1);
                    } else if (newArrivals.length > 0) {
                        updateCounter();
                    }
                })
                .catch(function(err) {
                    // Network error — keep showing whatever we have
                    console.warn('[slideshow] /api/album fetch error:', err);
                })
                .finally(schedulePoll);
        }

        function schedulePoll() {
            clearTimeout(pollTimer);
            pollTimer = setTimeout(fetchAlbum, POLL_INTERVAL);
        }

        // WebSocket: retained for instant new-photo notification and AI-style refresh
        function connect() {
            var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
            var ws    = new WebSocket(proto + '//' + location.host + '/ws');

            ws.onmessage = function(ev) {
                var data = JSON.parse(ev.data);
                if (!data.photo) return;

                if (data.updated) {
                    // AI-style version landed — bust cache on the currently-visible img.
                    // The next poll will also pick up the updated Immich asset URL.
                    if (currentIdx >= 0) {
                        var showing = slides[active].querySelector('img');
                        if (showing) {
                            showing.src = showing.src.replace(/\?t=\d+$/, '') + '?t=' + Date.now();
                        }
                    }
                } else if (!data.existing) {
                    // New upload — poll immediately to get its Immich asset URL
                    clearTimeout(pollTimer);
                    fetchAlbum();
                }
            };

            ws.onclose = function() { setTimeout(connect, 3000); };
        }

        // Startup
        fetchAlbum();
        connect();

        // Tap/click anywhere to advance
        document.addEventListener('click', function(e) {
            if (e.target === fsBtnEl || fsBtnEl.contains(e.target)) return;
            if (photos.length > 1) advance();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F') toggleFullscreen();
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                if (photos.length > 1) advance();
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function(){});
            } else {
                document.exitFullscreen();
            }
        }

        fsBtnEl.addEventListener('click', toggleFullscreen);
    </script>
</body>
</html>
